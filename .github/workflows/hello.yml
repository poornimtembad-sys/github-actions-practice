# workflow ( No indentation need to name the workflow)
# Should have name
name: Hello
# On tells when the workflow should run ( Give indentation by tab)
on:
  workflow_dispatch:
  
# jobs
# Should be inside the workflow
# jobs tells what the  workflow  should do , there can be one or more than one job, hence we write jobs
# Job is an object so needs indentation

jobs :
# first job give indentation
  say-hello:
  # Create an Ephermal container with ubuntu running
    run-on : Ubuntu-latest 
    # That ephermal container will have steps to execute, hence name those steps and use run
    steps:
      - name : Say hello to everyone
        run : echo "Hello Dosto"
        
        

# Step
# Should be inside the jobs

# Actions
# Should be inside the Step
